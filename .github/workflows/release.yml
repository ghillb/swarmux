name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.3)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dist-local:
    name: dist-local (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-26
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Install dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh
      - name: Build local artifacts
        id: dist
        shell: bash
        run: |
          dist build --tag "${{ github.event.inputs.tag }}" --target "${{ matrix.target }}" --artifacts=local --output-format=json > dist-manifest.json
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Upload local artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-local-${{ matrix.target }}
          path: |
            ${{ steps.dist.outputs.paths }}
            dist-manifest.json

  dist-global:
    needs: dist-local
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh
      - name: Download local artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dist-local-*
          path: target/distrib
          merge-multiple: true
      - name: Build global artifacts
        id: dist
        shell: bash
        run: |
          dist build --tag "${{ github.event.inputs.tag }}" --artifacts=global --output-format=json > dist-manifest.json
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Upload global artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-global
          path: |
            ${{ steps.dist.outputs.paths }}
            dist-manifest.json

  upload-release:
    needs: dist-global
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          path: artifacts
          merge-multiple: true
      - name: Ensure GitHub release exists
        shell: bash
        run: |
          if gh release view "${{ github.event.inputs.tag }}" -R "$GH_REPO" >/dev/null 2>&1; then
            echo "Release exists for ${{ github.event.inputs.tag }}"
          else
            gh release create "${{ github.event.inputs.tag }}" -R "$GH_REPO" \
              --target "${{ github.sha }}" \
              --title "${{ github.event.inputs.tag }}" \
              --notes "Manual release."
          fi
      - name: Upload artifacts to GitHub release
        shell: bash
        run: |
          mapfile -d '' files < <(find artifacts -type f ! -name 'dist-manifest.json' -print0)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "::error::No release artifact files found."
            exit 1
          fi
          gh release upload "${{ github.event.inputs.tag }}" --clobber -R "$GH_REPO" "${files[@]}"
