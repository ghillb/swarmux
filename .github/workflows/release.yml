name: Release

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - name: Release
        id: release_plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine released tag
        id: release_tag
        shell: bash
        env:
          RELEASES_CREATED: ${{ steps.release_plz.outputs.releases_created }}
          RELEASES: ${{ steps.release_plz.outputs.releases }}
        run: |
          tag=""
          if [[ "$RELEASES_CREATED" == "true" ]]; then
            tag="$(jq -r '.[0].tag // empty' <<<"$RELEASES")"
            if [[ -z "$tag" ]]; then
              echo "::error::release-plz reported a release but did not return a tag."
              exit 1
            fi
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - name: Create or update release PR
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dist-local:
    name: dist-local (${{ matrix.target }})
    needs: release
    if: needs.release.outputs.tag != ''
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-26
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Install dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh
      - name: Build local artifacts
        id: dist
        shell: bash
        run: |
          dist build --tag "${{ needs.release.outputs.tag }}" --target "${{ matrix.target }}" --artifacts=local --output-format=json > dist-manifest.json
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Upload local artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-local-${{ matrix.target }}
          path: |
            ${{ steps.dist.outputs.paths }}
            dist-manifest.json

  dist-global:
    needs: [release, dist-local]
    if: needs.release.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh
      - name: Download local artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dist-local-*
          path: target/distrib
          merge-multiple: true
      - name: Build global artifacts
        id: dist
        shell: bash
        run: |
          dist build --tag "${{ needs.release.outputs.tag }}" --artifacts=global --output-format=json > dist-manifest.json
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Upload global artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-global
          path: |
            ${{ steps.dist.outputs.paths }}
            dist-manifest.json

  upload-release:
    needs: [release, dist-global]
    if: needs.release.outputs.tag != ''
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          path: artifacts
          merge-multiple: true
      - name: Ensure GitHub release exists
        shell: bash
        run: |
          if gh release view "${{ needs.release.outputs.tag }}" -R "$GH_REPO" >/dev/null 2>&1; then
            echo "Release exists for ${{ needs.release.outputs.tag }}"
          else
            gh release create "${{ needs.release.outputs.tag }}" -R "$GH_REPO" \
              --target "${{ github.sha }}" \
              --title "${{ needs.release.outputs.tag }}" \
              --notes "Automated release."
          fi
      - name: Upload artifacts to GitHub release
        shell: bash
        run: |
          mapfile -d '' files < <(find artifacts -type f ! -name 'dist-manifest.json' -print0)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "::error::No release artifact files found."
            exit 1
          fi
          gh release upload "${{ needs.release.outputs.tag }}" --clobber -R "$GH_REPO" "${files[@]}"
